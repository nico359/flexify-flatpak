id: io.github.brandonp2412.flexify
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm21
command: flexify
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: flexify
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm21/bin:/run/build/flexify/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm21/lib
      env:
        PUB_CACHE: /run/build/flexify/.pub-cache
    build-commands:
      - flutter build linux --release --no-pub
      - install -D $BUNDLE_PATH/flexify /app/bin/flexify
      - cp -r $BUNDLE_PATH/lib /app/bin/lib
      - cp -r $BUNDLE_PATH/data /app/bin/data
      - install -Dm644 $BUNDLE_PATH/data/flutter_assets/assets/ic_launcher.png /app/share/icons/hicolor/512x512/apps/io.github.brandonp2412.flexify.png
      - install -Dm644 io.github.brandonp2412.flexify.desktop /app/share/applications/io.github.brandonp2412.flexify.desktop
      - install -Dm644 io.github.brandonp2412.flexify.metainfo.xml /app/share/metainfo/io.github.brandonp2412.flexify.metainfo.xml
    sources:
      - type: git
        url: https://github.com/brandonp2412/Flexify.git
        tag: 2.1.64
      - generated/sources/pubspec.json
      - type: dir
        path: sources
